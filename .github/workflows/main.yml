name: Generate Pacman Graph

on:
  schedule:
    # Roda automaticamente a cada 24 horas
    - cron: "0 0 * * *" 
  workflow_dispatch: # Permite que você rode manualmente na aba Actions
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. Clona o seu repositório
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Gera o gráfico do Pacman (O gerador oficial)
      - name: generate-pacman-contribution-graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Bruci87

      # 3. Envia o arquivo gerado para a branch 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
