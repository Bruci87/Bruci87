name: generate-pacman-graph


  # Executa automaticamente a cada 24 horas
on:
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite rodar manualmente para testar
  workflow_dispatch:
  
  # Roda sempre que você der push na main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o gráfico do Pacman a partir das suas contribuições
      - name: generate-pacman-contribution-graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # Puxa o arquivo gerado para a branch 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
